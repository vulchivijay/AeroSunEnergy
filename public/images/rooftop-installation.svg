<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffa000"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="680" cy="90" r="55" fill="url(#sunGrad)" opacity="0.95"/>
  <g stroke="#ffe082" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="680" y1="20" x2="680" y2="35"/>
    <line x1="680" y1="145" x2="680" y2="160"/>
    <line x1="610" y1="90" x2="625" y2="90"/>
    <line x1="735" y1="90" x2="750" y2="90"/>
    <line x1="630" y1="40" x2="641" y2="51"/>
    <line x1="719" y1="129" x2="730" y2="140"/>
    <line x1="730" y1="40" x2="719" y2="51"/>
    <line x1="641" y1="129" x2="630" y2="140"/>
  </g>

  <!-- Clouds -->
  <ellipse cx="120" cy="80" rx="60" ry="25" fill="white" opacity="0.25"/>
  <ellipse cx="155" cy="65" rx="45" ry="20" fill="white" opacity="0.25"/>
  <ellipse cx="310" cy="55" rx="50" ry="20" fill="white" opacity="0.2"/>
  <ellipse cx="350" cy="43" rx="35" ry="16" fill="white" opacity="0.2"/>

  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="url(#groundGrad)"/>

  <!-- House body -->
  <rect x="220" y="270" width="320" height="130" rx="4" fill="#e8e0d0"/>
  <!-- House roof -->
  <polygon points="190,270 610,270 490,175 330,175" fill="#b35c2e"/>
  <!-- Roof highlight -->
  <polygon points="190,270 380,270 380,175 330,175" fill="#8b4513" opacity="0.3"/>

  <!-- Door -->
  <rect x="348" y="330" width="60" height="70" rx="3" fill="#6d4c41"/>
  <circle cx="400" cy="368" r="4" fill="#ffc107"/>

  <!-- Windows -->
  <rect x="250" y="295" width="60" height="50" rx="3" fill="#90caf9" opacity="0.85"/>
  <line x1="280" y1="295" x2="280" y2="345" stroke="white" stroke-width="2"/>
  <line x1="250" y1="320" x2="310" y2="320" stroke="white" stroke-width="2"/>

  <rect x="446" y="295" width="60" height="50" rx="3" fill="#90caf9" opacity="0.85"/>
  <line x1="476" y1="295" x2="476" y2="345" stroke="white" stroke-width="2"/>
  <line x1="446" y1="320" x2="506" y2="320" stroke="white" stroke-width="2"/>

  <!-- Solar panels on roof -->
  <g opacity="0.95">
    <!-- Panel row 1 -->
    <rect x="340" y="188" width="45" height="28" rx="2" fill="url(#panelGrad)" transform="rotate(-27 340 188)"/>
    <rect x="385" y="175" width="45" height="28" rx="2" fill="url(#panelGrad)" transform="rotate(-27 385 175)"/>
    <rect x="430" y="162" width="45" height="28" rx="2" fill="url(#panelGrad)" transform="rotate(-27 430 162)"/>
    <!-- Panel row 2 -->
    <rect x="345" y="216" width="45" height="28" rx="2" fill="url(#panelGrad)" transform="rotate(-27 345 216)"/>
    <rect x="390" y="203" width="45" height="28" rx="2" fill="url(#panelGrad)" transform="rotate(-27 390 203)"/>
    <rect x="435" y="190" width="45" height="28" rx="2" fill="url(#panelGrad)" transform="rotate(-27 435 190)"/>
    <!-- Panel grid lines -->
    <g stroke="#90caf9" stroke-width="0.8" opacity="0.5">
      <line x1="362" y1="185" x2="352" y2="210" transform="rotate(-27 362 185)"/>
      <line x1="407" y1="172" x2="397" y2="197" transform="rotate(-27 407 172)"/>
      <line x1="452" y1="159" x2="442" y2="184" transform="rotate(-27 452 159)"/>
    </g>
  </g>

  <!-- Wind turbine (small VAWT beside house) -->
  <!-- Mast -->
  <rect x="615" y="260" width="6" height="140" fill="#cfd8dc" rx="2"/>
  <!-- Petals -->
  <ellipse cx="618" cy="238" rx="10" ry="24" fill="#80deea" opacity="0.85" transform="rotate(0 618 260)"/>
  <ellipse cx="618" cy="238" rx="10" ry="24" fill="#4dd0e1" opacity="0.80" transform="rotate(60 618 260)"/>
  <ellipse cx="618" cy="238" rx="10" ry="24" fill="#80deea" opacity="0.85" transform="rotate(120 618 260)"/>
  <ellipse cx="618" cy="238" rx="10" ry="24" fill="#4dd0e1" opacity="0.80" transform="rotate(180 618 260)"/>
  <ellipse cx="618" cy="238" rx="10" ry="24" fill="#80deea" opacity="0.85" transform="rotate(240 618 260)"/>
  <ellipse cx="618" cy="238" rx="10" ry="24" fill="#4dd0e1" opacity="0.80" transform="rotate(300 618 260)"/>
  <circle cx="618" cy="260" r="8" fill="white" opacity="0.95"/>
  <!-- Base -->
  <rect x="606" y="400" width="24" height="6" rx="2" fill="#90a4ae"/>

  <!-- Energy flow lines -->
  <path d="M580 260 Q560 300 540 350 Q520 390 490 400" stroke="#ffc107" stroke-width="2" stroke-dasharray="8 4" fill="none" opacity="0.7"/>
  <path d="M490 218 Q480 280 470 350 Q460 390 450 400" stroke="#ffc107" stroke-width="2" stroke-dasharray="8 4" fill="none" opacity="0.7"/>

  <!-- IoT meter box -->
  <rect x="155" y="330" width="50" height="55" rx="4" fill="#37474f"/>
  <rect x="160" y="335" width="40" height="25" rx="2" fill="#263238"/>
  <text x="173" y="350" fill="#00e676" font-family="monospace" font-size="9">12.4</text>
  <text x="167" y="360" fill="#00e676" font-family="monospace" font-size="7">kW/h</text>
  <rect x="168" y="365" width="8" height="8" rx="1" fill="#4caf50"/>
  <rect x="180" y="365" width="8" height="8" rx="1" fill="#2196f3"/>
  <rect x="192" y="365" width="8" height="8" rx="1" fill="#ff9800"/>

  <!-- Label -->
  <rect x="225" y="452" width="310" height="38" rx="6" fill="#0d47a1" opacity="0.85"/>
  <text x="380" y="477" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Residential Rooftop Solar + Wind System</text>
</svg>
