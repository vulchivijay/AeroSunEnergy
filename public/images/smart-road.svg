<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="70%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2a5298"/>
    </linearGradient>
    <linearGradient id="roadG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474f"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>
    <linearGradient id="solarG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyG)"/>

  <!-- Stars -->
  <circle cx="80" cy="40" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="70" r="1" fill="white" opacity="0.7"/>
  <circle cx="230" cy="30" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="350" cy="55" r="1" fill="white" opacity="0.6"/>
  <circle cx="440" cy="20" r="2" fill="white" opacity="0.8"/>
  <circle cx="530" cy="65" r="1" fill="white" opacity="0.7"/>
  <circle cx="620" cy="35" r="1.5" fill="white" opacity="0.85"/>
  <circle cx="720" cy="50" r="1" fill="white" opacity="0.6"/>

  <!-- Moon -->
  <circle cx="720" cy="80" r="30" fill="#ffe082" opacity="0.9"/>
  <circle cx="735" cy="72" r="24" fill="#1a3a5c"/>

  <!-- Road (perspective) -->
  <polygon points="0,280 800,280 800,500 0,500" fill="url(#roadG)"/>
  <!-- Road surface detail -->
  <polygon points="0,290 800,290 800,285 0,285" fill="#455a64" opacity="0.5"/>

  <!-- Lane markings -->
  <g fill="#ffc107" opacity="0.8">
    <rect x="90" y="350" width="60" height="8" rx="2"/>
    <rect x="230" y="350" width="60" height="8" rx="2"/>
    <rect x="370" y="350" width="60" height="8" rx="2"/>
    <rect x="510" y="350" width="60" height="8" rx="2"/>
    <rect x="650" y="350" width="60" height="8" rx="2"/>
  </g>

  <!-- Road shoulder lines -->
  <line x1="0" y1="295" x2="800" y2="295" stroke="white" stroke-width="3" opacity="0.4"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="white" stroke-width="3" opacity="0.4"/>

  <!-- Solar barrier panels (left side) -->
  <g>
    <!-- Post 1 -->
    <rect x="30" y="180" width="8" height="110" fill="#90a4ae" rx="2"/>
    <rect x="20" y="280" width="28" height="8" rx="2" fill="#607d8b"/>
    <rect x="18" y="160" width="55" height="35" rx="3" fill="url(#solarG)"/>
    <g stroke="#90caf9" stroke-width="1" opacity="0.5">
      <line x1="18" y1="168" x2="73" y2="168"/>
      <line x1="18" y1="177" x2="73" y2="177"/>
      <line x1="18" y1="186" x2="73" y2="186"/>
      <line x1="36" y1="160" x2="36" y2="195"/>
      <line x1="54" y1="160" x2="54" y2="195"/>
    </g>

    <!-- Post 2 -->
    <rect x="110" y="185" width="8" height="95" fill="#90a4ae" rx="2"/>
    <rect x="100" y="280" width="28" height="8" rx="2" fill="#607d8b"/>
    <rect x="98" y="165" width="55" height="35" rx="3" fill="url(#solarG)"/>
    <g stroke="#90caf9" stroke-width="1" opacity="0.5">
      <line x1="98" y1="173" x2="153" y2="173"/>
      <line x1="98" y1="182" x2="153" y2="182"/>
      <line x1="98" y1="191" x2="153" y2="191"/>
      <line x1="116" y1="165" x2="116" y2="200"/>
      <line x1="134" y1="165" x2="134" y2="200"/>
    </g>

    <!-- Post 3 -->
    <rect x="190" y="180" width="8" height="100" fill="#90a4ae" rx="2"/>
    <rect x="180" y="280" width="28" height="8" rx="2" fill="#607d8b"/>
    <rect x="178" y="160" width="55" height="35" rx="3" fill="url(#solarG)"/>
    <g stroke="#90caf9" stroke-width="1" opacity="0.5">
      <line x1="178" y1="168" x2="233" y2="168"/>
      <line x1="178" y1="177" x2="233" y2="177"/>
      <line x1="178" y1="186" x2="233" y2="186"/>
      <line x1="196" y1="160" x2="196" y2="195"/>
      <line x1="214" y1="160" x2="214" y2="195"/>
    </g>
  </g>

  <!-- Wind turbines (right median) -->
  <!-- Turbine 1 -->
  <rect x="548" y="70" width="6" height="210" fill="#cfd8dc" rx="2"/>
  <circle cx="551" cy="68" r="9" fill="#b0bec5"/>
  <ellipse cx="551" cy="28" rx="7" ry="38" fill="#e0f7fa" opacity="0.9" transform="rotate(0 551 68)"/>
  <ellipse cx="551" cy="28" rx="7" ry="38" fill="#b2ebf2" opacity="0.85" transform="rotate(120 551 68)"/>
  <ellipse cx="551" cy="28" rx="7" ry="38" fill="#e0f7fa" opacity="0.9" transform="rotate(240 551 68)"/>
  <rect x="540" y="280" width="22" height="6" rx="2" fill="#90a4ae"/>

  <!-- Turbine 2 -->
  <rect x="648" y="80" width="6" height="200" fill="#cfd8dc" rx="2"/>
  <circle cx="651" cy="78" r="9" fill="#b0bec5"/>
  <ellipse cx="651" cy="38" rx="7" ry="38" fill="#e0f7fa" opacity="0.9" transform="rotate(30 651 78)"/>
  <ellipse cx="651" cy="38" rx="7" ry="38" fill="#b2ebf2" opacity="0.85" transform="rotate(150 651 78)"/>
  <ellipse cx="651" cy="38" rx="7" ry="38" fill="#e0f7fa" opacity="0.9" transform="rotate(270 651 78)"/>
  <rect x="640" y="280" width="22" height="6" rx="2" fill="#90a4ae"/>

  <!-- Turbine 3 -->
  <rect x="748" y="75" width="6" height="205" fill="#cfd8dc" rx="2"/>
  <circle cx="751" cy="73" r="9" fill="#b0bec5"/>
  <ellipse cx="751" cy="33" rx="7" ry="38" fill="#e0f7fa" opacity="0.9" transform="rotate(60 751 73)"/>
  <ellipse cx="751" cy="33" rx="7" ry="38" fill="#b2ebf2" opacity="0.85" transform="rotate(180 751 73)"/>
  <ellipse cx="751" cy="33" rx="7" ry="38" fill="#e0f7fa" opacity="0.9" transform="rotate(300 751 73)"/>
  <rect x="740" y="280" width="22" height="6" rx="2" fill="#90a4ae"/>

  <!-- Street lights (LED powered) -->
  <g fill="#ffc107" opacity="0.85">
    <!-- Light 1 -->
    <rect x="320" y="155" width="5" height="125" fill="#90a4ae" rx="2"/>
    <path d="M322 155 Q340 140 355 145" stroke="#90a4ae" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="355" cy="142" rx="12" ry="5" fill="#ffc107"/>
    <ellipse cx="355" cy="142" rx="12" ry="5" fill="#ffc107" opacity="0.4" transform="scale(1.5) translate(-118 -47)"/>

    <!-- Light 2 -->
    <rect x="450" y="155" width="5" height="125" fill="#90a4ae" rx="2"/>
    <path d="M452 155 Q470 140 485 145" stroke="#90a4ae" stroke-width="4" fill="none" stroke-linecap="round"/>
    <ellipse cx="485" cy="142" rx="12" ry="5" fill="#ffc107"/>
  </g>

  <!-- Energy glow on road -->
  <rect x="0" y="280" width="800" height="15" fill="#4fc3f7" opacity="0.08"/>

  <!-- EV charging sign -->
  <rect x="360" y="300" width="35" height="45" rx="3" fill="#1565c0"/>
  <text x="377" y="328" text-anchor="middle" fill="#ffc107" font-family="Arial" font-size="20" font-weight="bold">⚡</text>

  <!-- Label -->
  <rect x="190" y="452" width="420" height="38" rx="6" fill="#1a3a5c" opacity="0.9"/>
  <text x="400" y="477" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Smart Energy Roads &amp; Highway Infrastructure</text>
</svg>
