<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="skyPark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="grassG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="pathG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bcaaa4"/>
      <stop offset="100%" stop-color="#a1887f"/>
    </linearGradient>
    <linearGradient id="canopyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyPark)"/>

  <!-- Sun -->
  <circle cx="100" cy="80" r="48" fill="#fff176" opacity="0.95"/>
  <g stroke="#fff176" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <line x1="100" y1="18" x2="100" y2="30"/>
    <line x1="100" y1="130" x2="100" y2="142"/>
    <line x1="38" y1="80" x2="50" y2="80"/>
    <line x1="150" y1="80" x2="162" y2="80"/>
    <line x1="56" y1="36" x2="65" y2="45"/>
    <line x1="135" y1="115" x2="144" y2="124"/>
    <line x1="144" y1="36" x2="135" y2="45"/>
    <line x1="65" y1="115" x2="56" y2="124"/>
  </g>

  <!-- Clouds -->
  <ellipse cx="300" cy="70" rx="70" ry="28" fill="white" opacity="0.85"/>
  <ellipse cx="345" cy="55" rx="55" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="560" cy="55" rx="60" ry="24" fill="white" opacity="0.8"/>
  <ellipse cx="600" cy="43" rx="45" ry="18" fill="white" opacity="0.8"/>

  <!-- Ground -->
  <rect x="0" y="360" width="800" height="140" fill="url(#grassG)"/>

  <!-- Park path -->
  <ellipse cx="400" cy="430" rx="280" ry="40" fill="url(#pathG)" opacity="0.7"/>

  <!-- Trees -->
  <!-- Tree 1 -->
  <rect x="58" y="285" width="14" height="80" fill="#5d4037" rx="3"/>
  <circle cx="65" cy="265" r="45" fill="#2e7d32"/>
  <circle cx="45" cy="278" r="32" fill="#388e3c"/>
  <circle cx="85" cy="278" r="32" fill="#2e7d32"/>

  <!-- Tree 2 -->
  <rect x="718" y="290" width="14" height="75" fill="#5d4037" rx="3"/>
  <circle cx="725" cy="270" r="42" fill="#2e7d32"/>
  <circle cx="706" cy="282" r="30" fill="#388e3c"/>
  <circle cx="744" cy="282" r="30" fill="#2e7d32"/>

  <!-- Tree 3 (background) -->
  <rect x="168" y="305" width="10" height="60" fill="#5d4037" rx="2"/>
  <circle cx="173" cy="290" r="32" fill="#43a047"/>

