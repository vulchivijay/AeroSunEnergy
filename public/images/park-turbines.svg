  <rect x="550" y="220" width="7" height="140" fill="#90a4ae" rx="2"/>
  <ellipse cx="553" cy="193" rx="11" ry="26" fill="#ce93d8" opacity="0.9" transform="rotate(0 553 220)"/>
  <ellipse cx="553" cy="193" rx="11" ry="26" fill="#ba68c8" opacity="0.85" transform="rotate(45 553 220)"/>
  <ellipse cx="553" cy="193" rx="11" ry="26" fill="#ce93d8" opacity="0.9" transform="rotate(90 553 220)"/>
  <ellipse cx="553" cy="193" rx="11" ry="26" fill="#ba68c8" opacity="0.85" transform="rotate(135 553 220)"/>
  <ellipse cx="553" cy="193" rx="11" ry="26" fill="#ce93d8" opacity="0.9" transform="rotate(180 553 220)"/>
  <ellipse cx="553" cy="193" rx="11" ry="26" fill="#ba68c8" opacity="0.85" transform="rotate(225 553 220)"/>
