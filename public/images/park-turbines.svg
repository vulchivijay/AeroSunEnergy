  <rect x="118" y="318" width="120" height="18" rx="3" fill="url(#canopyG)"/>
  <g stroke="#90caf9" stroke-width="1" opacity="0.5">
    <line x1="118" y1="323" x2="238" y2="323"/>
    <line x1="118" y1="329" x2="238" y2="329"/>
    <line x1="118" y1="335" x2="238" y2="335"/>
    <line x1="148" y1="318" x2="148" y2="336"/>
    <line x1="178" y1="318" x2="178" y2="336"/>
    <line x1="208" y1="318" x2="208" y2="336"/>
  </g>
  <!-- Bench seat -->
  <rect x="125" y="360" width="110" height="8" rx="2" fill="#8d6e63"/>
  <rect x="130" y="350" width="7" height="10" fill="#795548" rx="1"/>
  <rect x="220" y="350" width="7" height="10" fill="#795548" rx="1"/>

  <!-- Wi-Fi symbol (park amenity) -->
  <text x="175" y="410" text-anchor="middle" fill="white" font-size="18" opacity="0.85">📶</text>

  <!-- Label -->
  <rect x="185" y="452" width="430" height="38" rx="6" fill="#1b5e20" opacity="0.88"/>
  <text x="400" y="477" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Public Parks — Flower Turbines &amp; Solar Canopies</text>
</svg>
