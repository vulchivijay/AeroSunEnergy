<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="skyField" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="60%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="fieldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="panelField" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="mountainG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909c"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#skyField)"/>

  <!-- Mountains (background) -->
  <polygon points="0,260 120,140 220,220 300,150 420,260" fill="url(#mountainG)" opacity="0.45"/>
  <polygon points="380,260 480,150 580,190 680,130 800,220 800,260" fill="url(#mountainG)" opacity="0.4"/>

  <!-- Sun -->
  <circle cx="680" cy="80" r="50" fill="#fff176" opacity="0.92"/>
  <g stroke="#fff176" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="680" y1="15" x2="680" y2="27"/>
    <line x1="680" y1="133" x2="680" y2="145"/>
    <line x1="615" y1="80" x2="627" y2="80"/>
    <line x1="733" y1="80" x2="745" y2="80"/>
    <line x1="634" y1="34" x2="643" y2="43"/>
    <line x1="717" y1="117" x2="726" y2="126"/>
    <line x1="726" y1="34" x2="717" y2="43"/>
    <line x1="643" y1="117" x2="634" y2="126"/>
  </g>

  <!-- Clouds -->
  <ellipse cx="180" cy="75" rx="65" ry="26" fill="white" opacity="0.8"/>
  <ellipse cx="220" cy="60" rx="50" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="420" cy="60" rx="55" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="460" cy="48" rx="40" ry="16" fill="white" opacity="0.7"/>

  <!-- Ground -->
  <rect x="0" y="310" width="800" height="190" fill="url(#fieldG)"/>
  <!-- Field rows texture -->
  <g stroke="#4caf50" stroke-width="1.5" opacity="0.3">
    <line x1="0" y1="330" x2="800" y2="330"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="370" x2="800" y2="370"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="0" y1="410" x2="800" y2="410"/>
  </g>

  <!-- Solar panel array (left section) -->
  <!-- Row 1 -->
  <g opacity="0.95">
    <rect x="30" y="240" width="70" height="42" rx="3" fill="url(#panelField)" transform="rotate(-8 30 240)"/>
    <g stroke="#90caf9" stroke-width="1.2" opacity="0.5" transform="rotate(-8 30 240)">
      <line x1="30" y1="254" x2="100" y2="254"/>
      <line x1="30" y1="268" x2="100" y2="268"/>
      <line x1="54" y1="240" x2="54" y2="282"/>
      <line x1="78" y1="240" x2="78" y2="282"/>
    </g>
  </g>
  <g opacity="0.95">
    <rect x="115" y="245" width="70" height="42" rx="3" fill="url(#panelField)" transform="rotate(-8 115 245)"/>
    <g stroke="#90caf9" stroke-width="1.2" opacity="0.5" transform="rotate(-8 115 245)">
      <line x1="115" y1="259" x2="185" y2="259"/>
      <line x1="115" y1="273" x2="185" y2="273"/>
      <line x1="139" y1="245" x2="139" y2="287"/>
      <line x1="163" y1="245" x2="163" y2="287"/>
    </g>
  </g>
  <g opacity="0.95">
    <rect x="200" y="242" width="70" height="42" rx="3" fill="url(#panelField)" transform="rotate(-8 200 242)"/>
    <g stroke="#90caf9" stroke-width="1.2" opacity="0.5" transform="rotate(-8 200 242)">
      <line x1="200" y1="256" x2="270" y2="256"/>
      <line x1="200" y1="270" x2="270" y2="270"/>
      <line x1="224" y1="242" x2="224" y2="284"/>
      <line x1="248" y1="242" x2="248" y2="284"/>
    </g>
  </g>
  <!-- Row 2 (behind) -->
  <g opacity="0.75">
    <rect x="35" y="218" width="68" height="38" rx="3" fill="url(#panelField)" transform="rotate(-8 35 218)"/>
    <rect x="120" y="222" width="68" height="38" rx="3" fill="url(#panelField)" transform="rotate(-8 120 222)"/>
    <rect x="205" y="219" width="68" height="38" rx="3" fill="url(#panelField)" transform="rotate(-8 205 219)"/>
  </g>
  <!-- Panel stands -->
  <line x1="55" y1="285" x2="50" y2="310" stroke="#78909c" stroke-width="3" opacity="0.8"/>
  <line x1="90" y1="285" x2="95" y2="310" stroke="#78909c" stroke-width="3" opacity="0.8"/>
  <line x1="140" y1="290" x2="135" y2="310" stroke="#78909c" stroke-width="3" opacity="0.8"/>
  <line x1="175" y1="290" x2="180" y2="310" stroke="#78909c" stroke-width="3" opacity="0.8"/>
  <line x1="225" y1="288" x2="220" y2="310" stroke="#78909c" stroke-width="3" opacity="0.8"/>
  <line x1="260" y1="288" x2="265" y2="310" stroke="#78909c" stroke-width="3" opacity="0.8"/>

  <!-- Large HAWT Turbine 1 -->
  <polygon points="492,310 502,310 499,100 495,100" fill="#b0bec5" opacity="0.9"/>
  <circle cx="497" cy="98" r="11" fill="#90a4ae"/>
  <ellipse cx="497" cy="48" rx="9" ry="48" fill="#eceff1" opacity="0.9" transform="rotate(0 497 98)"/>
  <ellipse cx="497" cy="48" rx="9" ry="48" fill="#cfd8dc" opacity="0.85" transform="rotate(120 497 98)"/>
  <ellipse cx="497" cy="48" rx="9" ry="48" fill="#eceff1" opacity="0.9" transform="rotate(240 497 98)"/>
  <path d="M465,55 A45,45 0 0,1 529,55" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="5 3" fill="none" opacity="0.5"/>

  <!-- Large HAWT Turbine 2 -->
  <polygon points="612,310 622,310 619,115 615,115" fill="#b0bec5" opacity="0.9"/>
  <circle cx="617" cy="113" r="10" fill="#90a4ae"/>
  <ellipse cx="617" cy="68" rx="8" ry="43" fill="#eceff1" opacity="0.9" transform="rotate(20 617 113)"/>
  <ellipse cx="617" cy="68" rx="8" ry="43" fill="#cfd8dc" opacity="0.85" transform="rotate(140 617 113)"/>
  <ellipse cx="617" cy="68" rx="8" ry="43" fill="#eceff1" opacity="0.9" transform="rotate(260 617 113)"/>

  <!-- Large HAWT Turbine 3 (background, smaller) -->
  <polygon points="718,310 726,310 724,160 720,160" fill="#b0bec5" opacity="0.7"/>
  <circle cx="722" cy="158" r="8" fill="#90a4ae" opacity="0.7"/>
  <ellipse cx="722" cy="123" rx="7" ry="33" fill="#eceff1" opacity="0.65" transform="rotate(10 722 158)"/>
  <ellipse cx="722" cy="123" rx="7" ry="33" fill="#cfd8dc" opacity="0.6" transform="rotate(130 722 158)"/>
  <ellipse cx="722" cy="123" rx="7" ry="33" fill="#eceff1" opacity="0.65" transform="rotate(250 722 158)"/>

  <!-- Control building -->
  <rect x="330" y="270" width="100" height="40" rx="3" fill="#546e7a"/>
  <rect x="340" y="250" width="80" height="20" rx="2" fill="#607d8b"/>
  <rect x="355" y="272" width="20" height="30" rx="2" fill="#37474f"/>
  <rect x="390" y="275" width="24" height="18" rx="2" fill="#90caf9" opacity="0.7"/>

  <!-- Label -->
  <rect x="180" y="452" width="440" height="38" rx="6" fill="#0d47a1" opacity="0.88"/>
  <text x="400" y="477" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Open Land &amp; Commercial Solar Wind Farm</text>
</svg>
