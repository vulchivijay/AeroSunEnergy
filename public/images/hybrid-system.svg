<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="solarEn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="battG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="gridG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Grid lines (decorative) -->
  <g stroke="#1e3a5c" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold" opacity="0.95">Hybrid Solar + Wind Energy System</text>

  <!-- ── Solar Panel (top-left) ── -->
  <rect x="60" y="70" width="140" height="100" rx="10" fill="#0d1b2a" stroke="#1565c0" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" fill="#64b5f6" font-family="Arial" font-size="11" font-weight="bold">☀️ SOLAR</text>
  <rect x="75" y="100" width="110" height="55" rx="4" fill="url(#solarEn)"/>
  <g stroke="#90caf9" stroke-width="1" opacity="0.6">
    <line x1="75" y1="114" x2="185" y2="114"/>
    <line x1="75" y1="128" x2="185" y2="128"/>
    <line x1="75" y1="142" x2="185" y2="142"/>
    <line x1="102" y1="100" x2="102" y2="155"/>
    <line x1="130" y1="100" x2="130" y2="155"/>
    <line x1="158" y1="100" x2="158" y2="155"/>
  </g>
  <text x="130" y="183" text-anchor="middle" fill="#ffc107" font-family="Arial" font-size="10">15 kW peak</text>

  <!-- ── Wind Turbine (top-right) ── -->
  <rect x="600" y="70" width="140" height="100" rx="10" fill="#0d1b2a" stroke="#1565c0" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" fill="#64b5f6" font-family="Arial" font-size="11" font-weight="bold">💨 WIND</text>
  <!-- Mini turbine SVG -->
  <rect x="666" y="115" width="5" height="45" fill="#90a4ae" rx="1"/>
  <circle cx="668" cy="113" r="6" fill="#78909c"/>
  <ellipse cx="668" cy="90" rx="5" ry="21" fill="#e0f7fa" opacity="0.9" transform="rotate(0 668 113)"/>
  <ellipse cx="668" cy="90" rx="5" ry="21" fill="#b2ebf2" opacity="0.85" transform="rotate(120 668 113)"/>
  <ellipse cx="668" cy="90" rx="5" ry="21" fill="#e0f7fa" opacity="0.9" transform="rotate(240 668 113)"/>
  <text x="670" y="183" text-anchor="middle" fill="#ffc107" font-family="Arial" font-size="10">8 kW continuous</text>

  <!-- ── Smart Inverter / Controller (centre top) ── -->
  <rect x="310" y="75" width="180" height="95" rx="10" fill="#0d1b2a" stroke="#26c6da" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" fill="#26c6da" font-family="Arial" font-size="11" font-weight="bold">⚙️ SMART INVERTER</text>
  <rect x="325" y="108" width="150" height="45" rx="5" fill="#0a2240"/>
  <!-- Display bars -->
  <rect x="335" y="118" width="20" height="25" rx="2" fill="#4caf50"/>
  <rect x="362" y="123" width="20" height="20" rx="2" fill="#2196f3"/>
  <rect x="389" y="115" width="20" height="28" rx="2" fill="#ffc107"/>
  <rect x="416" y="120" width="20" height="23" rx="2" fill="#4caf50"/>
  <rect x="443" y="117" width="20" height="26" rx="2" fill="#26c6da"/>
  <text x="400" y="168" text-anchor="middle" fill="#80cbc4" font-family="Arial" font-size="9">AI-Optimised Output</text>

  <!-- ── Battery Storage (bottom-left) ── -->
  <rect x="80" y="310" width="160" height="110" rx="10" fill="#0d1b2a" stroke="#4caf50" stroke-width="2"/>
  <text x="160" y="335" text-anchor="middle" fill="#81c784" font-family="Arial" font-size="11" font-weight="bold">🔋 BATTERY</text>
  <!-- Battery cells -->
  <rect x="95" y="345" width="130" height="55" rx="4" fill="#0a2240"/>
  <rect x="100" y="350" width="28" height="42" rx="3" fill="url(#battG)" opacity="0.85"/>
  <rect x="133" y="350" width="28" height="42" rx="3" fill="url(#battG)" opacity="0.85"/>
  <rect x="166" y="350" width="28" height="35" rx="3" fill="url(#battG)" opacity="0.7"/>
  <rect x="199" y="350" width="20" height="20" rx="3" fill="url(#battG)" opacity="0.45"/>
  <text x="160" y="415" text-anchor="middle" fill="#a5d6a7" font-family="Arial" font-size="9">78% charged · 45 kWh</text>

  <!-- ── Power Grid (bottom-right) ── -->
  <rect x="560" y="310" width="160" height="110" rx="10" fill="#0d1b2a" stroke="#ff8f00" stroke-width="2"/>
  <text x="640" y="335" text-anchor="middle" fill="#ffb74d" font-family="Arial" font-size="11" font-weight="bold">⚡ GRID / HOME</text>
  <!-- Pylons mini -->
  <rect x="580" y="350" width="5" height="50" fill="#78909c"/>
  <line x1="577" y1="360" x2="588" y2="360" stroke="#90a4ae" stroke-width="2"/>
  <line x1="577" y1="370" x2="588" y2="370" stroke="#90a4ae" stroke-width="2"/>
  <!-- House mini -->
  <rect x="620" y="370" width="50" height="30" fill="#455a64"/>
  <polygon points="615,370 675,370 647,350" fill="#37474f"/>
  <!-- Lines on panel -->
  <rect x="628" y="378" width="14" height="18" fill="#546e7a"/>
  <rect x="648" y="380" width="10" height="14" fill="#90caf9" opacity="0.6"/>
  <text x="640" y="415" text-anchor="middle" fill="#ffcc80" font-family="Arial" font-size="9">Net Metering Enabled</text>

  <!-- ── IoT Monitor (centre bottom) ── -->
  <rect x="310" y="310" width="180" height="110" rx="10" fill="#0d1b2a" stroke="#9c27b0" stroke-width="2"/>
  <text x="400" y="335" text-anchor="middle" fill="#ce93d8" font-family="Arial" font-size="11" font-weight="bold">📡 IoT DASHBOARD</text>
  <!-- Phone mockup -->
  <rect x="355" y="345" width="50" height="65" rx="6" fill="#1a1a2e" stroke="#7e57c2" stroke-width="1.5"/>
  <rect x="359" y="352" width="42" height="48" rx="3" fill="#0d0d1a"/>
  <!-- Screen content -->
  <rect x="362" y="355" width="36" height="6" rx="1" fill="#4caf50" opacity="0.8"/>
  <rect x="362" y="364" width="26" height="4" rx="1" fill="#2196f3" opacity="0.7"/>
  <rect x="362" y="371" width="32" height="4" rx="1" fill="#ffc107" opacity="0.7"/>
  <rect x="362" y="378" width="20" height="4" rx="1" fill="#26c6da" opacity="0.7"/>
  <circle cx="380" cy="400" r="3" fill="#7e57c2"/>
  <!-- Stats beside phone -->
  <text x="416" y="362" fill="#e1bee7" font-family="monospace" font-size="9">Solar: 14.2 kW</text>
  <text x="416" y="374" fill="#e1bee7" font-family="monospace" font-size="9">Wind:  7.8 kW</text>
  <text x="416" y="386" fill="#e1bee7" font-family="monospace" font-size="9">Save: ₹3,840</text>
  <text x="416" y="398" fill="#00e676" font-family="monospace" font-size="9">● Live</text>
  <text x="400" y="415" text-anchor="middle" fill="#b39ddb" font-family="Arial" font-size="9">Real-time Monitoring</text>

  <!-- ── Connection arrows ── -->
  <!-- Solar → Inverter -->
  <line x1="200" y1="120" x2="310" y2="120" stroke="#ffc107" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.85" filter="url(#glow)"/>
  <polygon points="310,115 325,120 310,125" fill="#ffc107" opacity="0.85"/>

  <!-- Wind → Inverter -->
  <line x1="600" y1="120" x2="490" y2="120" stroke="#4dd0e1" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.85" filter="url(#glow)"/>
  <polygon points="490,115 475,120 490,125" fill="#4dd0e1" opacity="0.85"/>

  <!-- Inverter → Battery -->
  <line x1="355" y1="170" x2="200" y2="310" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.85" filter="url(#glow)"/>
  <polygon points="196,305 205,320 214,305" fill="#4caf50" opacity="0.85"/>

  <!-- Inverter → Grid -->
  <line x1="445" y1="170" x2="600" y2="310" stroke="#ff8f00" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.85" filter="url(#glow)"/>
  <polygon points="596,305 605,320 614,305" fill="#ff8f00" opacity="0.85"/>

  <!-- Inverter → IoT -->
  <line x1="400" y1="170" x2="400" y2="310" stroke="#9c27b0" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.85" filter="url(#glow)"/>
  <polygon points="395,305 400,320 405,305" fill="#9c27b0" opacity="0.85"/>

  <!-- Label -->
  <rect x="175" y="455" width="450" height="35" rx="6" fill="#0d1b2a" stroke="#1565c0" stroke-width="1.5"/>
  <text x="400" y="478" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Integrated Smart Energy System — Solar · Wind · Battery · Grid</text>
</svg>
