<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="skyDawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="40%" stop-color="#283593"/>
      <stop offset="70%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="seaG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0277bd"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="coralG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="40%" stop-color="#ff8a65"/>
      <stop offset="100%" stop-color="#ff5722"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <radialGradient id="sunRise" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#ff8a65" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff8a65" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky with sunrise glow -->
  <rect width="800" height="500" fill="url(#skyDawn)"/>
  <rect width="800" height="500" fill="url(#sunRise)" opacity="0.7"/>

  <!-- Horizon glow -->
  <ellipse cx="400" cy="310" rx="400" ry="60" fill="#ff8a65" opacity="0.25"/>

  <!-- Rising sun -->
  <circle cx="400" cy="310" r="55" fill="url(#coralG)" opacity="0.92"/>
  <g stroke="#ff8a65" stroke-width="2.5" stroke-linecap="round" opacity="0.5">
    <line x1="400" y1="238" x2="400" y2="250"/>
    <line x1="440" y1="250" x2="432" y2="259"/>
    <line x1="452" y1="290" x2="440" y2="290"/>
    <line x1="360" y1="250" x2="368" y2="259"/>
    <line x1="348" y1="290" x2="360" y2="290"/>
  </g>

  <!-- Stars (fading) -->
  <circle cx="80" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="580" cy="45" r="1.5" fill="white" opacity="0.55"/>
  <circle cx="700" cy="25" r="1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="75" r="1" fill="white" opacity="0.45"/>
  <circle cx="140" cy="80" r="1.5" fill="white" opacity="0.5"/>

  <!-- Sea / water reflection -->
  <rect x="0" y="310" width="800" height="190" fill="url(#seaG)"/>
  <!-- Sea shimmer -->
  <g stroke="#4fc3f7" stroke-width="1" opacity="0.25">
    <line x1="50" y1="340" x2="150" y2="340"/>
    <line x1="200" y1="355" x2="320" y2="355"/>
    <line x1="380" y1="345" x2="480" y2="345"/>
    <line x1="520" y1="360" x2="640" y2="360"/>
    <line x1="680" y1="348" x2="770" y2="348"/>
    <line x1="100" y1="375" x2="220" y2="375"/>
    <line x1="290" y1="388" x2="430" y2="388"/>
    <line x1="490" y1="378" x2="620" y2="378"/>
  </g>

  <!-- Sun reflection on water -->
  <ellipse cx="400" cy="380" rx="30" ry="70" fill="#ff8a65" opacity="0.2"/>

  <!-- Offshore wind turbines -->
  <!-- Turbine 1 (left) -->
  <rect x="93" y="135" width="8" height="175" fill="#b0bec5" rx="3"/>
  <!-- Base in water -->
  <polygon points="89,310 105,310 108,340 86,340" fill="#78909c" opacity="0.9"/>
  <circle cx="97" cy="133" r="11" fill="#90a4ae"/>
  <ellipse cx="97" cy="83" rx="9" ry="48" fill="#e8f5e9" opacity="0.9" transform="rotate(15 97 133)"/>
  <ellipse cx="97" cy="83" rx="9" ry="48" fill="#c8e6c9" opacity="0.85" transform="rotate(135 97 133)"/>
  <ellipse cx="97" cy="83" rx="9" ry="48" fill="#e8f5e9" opacity="0.9" transform="rotate(255 97 133)"/>

  <!-- Turbine 2 (centre-left) -->
  <rect x="233" y="125" width="9" height="185" fill="#b0bec5" rx="3"/>
  <polygon points="229,310 246,310 249,340 226,340" fill="#78909c" opacity="0.9"/>
  <circle cx="237" cy="123" r="12" fill="#90a4ae"/>
  <ellipse cx="237" cy="68" rx="10" ry="53" fill="#e8f5e9" opacity="0.9" transform="rotate(0 237 123)"/>
  <ellipse cx="237" cy="68" rx="10" ry="53" fill="#c8e6c9" opacity="0.85" transform="rotate(120 237 123)"/>
  <ellipse cx="237" cy="68" rx="10" ry="53" fill="#e8f5e9" opacity="0.9" transform="rotate(240 237 123)"/>

  <!-- Turbine 3 (centre) -->
  <rect x="388" y="110" width="10" height="200" fill="#b0bec5" rx="3"/>
  <polygon points="383,310 402,310 406,345 379,345" fill="#78909c" opacity="0.9"/>
  <circle cx="393" cy="108" r="13" fill="#90a4ae"/>
  <ellipse cx="393" cy="48" rx="11" ry="58" fill="#e8f5e9" opacity="0.9" transform="rotate(30 393 108)"/>
  <ellipse cx="393" cy="48" rx="11" ry="58" fill="#c8e6c9" opacity="0.85" transform="rotate(150 393 108)"/>
  <ellipse cx="393" cy="48" rx="11" ry="58" fill="#e8f5e9" opacity="0.9" transform="rotate(270 393 108)"/>

  <!-- Turbine 4 (centre-right) -->
  <rect x="543" y="120" width="9" height="190" fill="#b0bec5" rx="3"/>
  <polygon points="539,310 556,310 559,340 536,340" fill="#78909c" opacity="0.9"/>
  <circle cx="547" cy="118" r="12" fill="#90a4ae"/>
  <ellipse cx="547" cy="63" rx="10" ry="53" fill="#e8f5e9" opacity="0.9" transform="rotate(10 547 118)"/>
  <ellipse cx="547" cy="63" rx="10" ry="53" fill="#c8e6c9" opacity="0.85" transform="rotate(130 547 118)"/>
  <ellipse cx="547" cy="63" rx="10" ry="53" fill="#e8f5e9" opacity="0.9" transform="rotate(250 547 118)"/>

  <!-- Turbine 5 (right) -->
  <rect x="693" y="135" width="8" height="175" fill="#b0bec5" rx="3"/>
  <polygon points="689,310 705,310 708,340 686,340" fill="#78909c" opacity="0.9"/>
  <circle cx="697" cy="133" r="11" fill="#90a4ae"/>
  <ellipse cx="697" cy="83" rx="9" ry="48" fill="#e8f5e9" opacity="0.9" transform="rotate(45 697 133)"/>
  <ellipse cx="697" cy="83" rx="9" ry="48" fill="#c8e6c9" opacity="0.85" transform="rotate(165 697 133)"/>
  <ellipse cx="697" cy="83" rx="9" ry="48" fill="#e8f5e9" opacity="0.9" transform="rotate(285 697 133)"/>

  <!-- Underwater cable connections -->
  <g stroke="#ffc107" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4">
    <line x1="97" y1="340" x2="237" y2="340"/>
    <line x1="237" y1="340" x2="393" y2="345"/>
    <line x1="393" y1="345" x2="547" y2="340"/>
    <line x1="547" y1="340" x2="697" y2="340"/>
  </g>

  <!-- Floating solar platform -->
  <rect x="290" y="400" width="220" height="40" rx="8" fill="#0d47a1" opacity="0.85"/>
  <g stroke="#90caf9" stroke-width="1.2" opacity="0.55">
    <line x1="290" y1="413" x2="510" y2="413"/>
    <line x1="290" y1="425" x2="510" y2="425"/>
    <line x1="290" y1="437" x2="510" y2="437"/>
    <line x1="327" y1="400" x2="327" y2="440"/>
    <line x1="364" y1="400" x2="364" y2="440"/>
    <line x1="401" y1="400" x2="401" y2="440"/>
    <line x1="438" y1="400" x2="438" y2="440"/>
    <line x1="475" y1="400" x2="475" y2="440"/>
  </g>

  <!-- Label -->
  <rect x="185" y="455" width="430" height="36" rx="6" fill="#0d1b2a" opacity="0.9"/>
  <text x="400" y="478" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Offshore Wind + Floating Solar Energy Farm</text>
</svg>
