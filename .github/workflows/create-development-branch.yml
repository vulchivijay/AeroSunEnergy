name: Create development branch

on:
  push:
    branches:
      - main

jobs:
  create-development-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Create development branch if it does not exist
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;

            try {
              await github.rest.repos.getBranch({ owner, repo, branch: 'development' });
              console.log('development branch already exists — skipping creation');
            } catch (err) {
              if (err.status === 404) {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: 'refs/heads/development',
                  sha,
                });
                console.log(`Created development branch at ${sha}`);
              } else {
                throw err;
              }
            }
